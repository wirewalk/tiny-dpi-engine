stages:
  - build
  - test

build:
  stage: build
  image: alt:latest
  before_script:
    - apt-get update && apt-get install -y gcc make libpcap-devel
  script:
    - make clean && make
  artifacts:
    paths:
      - tiny-dpi-engine

test:
  stage: test
  image: alt:latest
  before_script:
    - apt-get update && apt-get install -y gcc make libpcap-devel
  script:
    - gcc -std=c11 -Wall -Wextra -Iinclude -o build/test_main
      tests/test_main.c src/proto.c src/packet.c src/flow.c
      src/aho_corasick.c src/signatures.c src/stats.c src/classify.c
      -lpcap
    - ./build/test_main
    - ./tiny-dpi-engine -s signatures/default.sig -h || true
  needs:
    - build
