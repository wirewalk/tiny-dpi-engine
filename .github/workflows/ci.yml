name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build
        run: make clean && make

      - name: Run tests
        run: |
          gcc -std=c11 -Wall -Wextra -Iinclude -o build/test_main tests/test_main.c src/proto.c src/packet.c src/flow.c src/aho_corasick.c src/signatures.c src/stats.c src/classify.c -lpcap
          ./build/test_main

      - name: Run with signatures
        run: ./tiny-dpi-engine -s signatures/default.sig -h || true
